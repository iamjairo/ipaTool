# =============================================================================
# ipaTool - Docker Compose (production / NAS runtime)
# Tested with: Synology Container Manager (DS220+, DSM 7.x)
# The deprecated "version:" key is intentionally omitted (Compose v2 spec).
#
# Run:  docker compose up -d
# Stop: docker compose down
# Logs: docker compose logs -f ipa-webtool
# =============================================================================

services:
  ipa-webtool:
    build:
      context: .
      dockerfile: Dockerfile
      # Remove the "cache_from" line if you do not push to a registry.
      # cache_from:
      #   - ghcr.io/iamjairo/ipatool:latest
    image: ipa-tool:latest
    container_name: ipa-webtool

    # --- Port mapping --------------------------------------------------------
    # Change the HOST port (left side) if 8080 is taken on your NAS.
    ports:
      - "8080:8080"

    # --- Environment ---------------------------------------------------------
    environment:
      PORT: "8080"
      RUST_LOG: "info"
      DATABASE_PATH: "/app/data/ipa-webtool.db"
      # Uncomment to set an API base URL for OTA distribution.
      # OTA_BASE_URL: "https://your-nas-ddns.example.com"

    # --- Volumes -------------------------------------------------------------
    # Named volumes are managed by Docker (safe default for NAS).
    # To use host-path bind mounts instead (useful when you want to access
    # files directly from the Synology File Station), replace the short name
    # with an absolute path, e.g.:
    #   - /volume1/docker/ipatool/data:/app/data
    volumes:
      - ipa-data:/app/data
      - ipa-downloads:/app/downloads

    # --- Restart policy ------------------------------------------------------
    # "unless-stopped" survives DSM reboots without re-enabling via GUI.
    restart: unless-stopped

    # --- Health check --------------------------------------------------------
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    # --- Resource limits (optional, good practice on shared NAS) ------------
    # Uncomment and tune to protect DS220+ from runaway processes.
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "1.5"
    #       memory: 512M
    #     reservations:
    #       memory: 128M

    networks:
      - ipa-net

    # --- Synology Container Manager labels -----------------------------------
    # These appear in the Container Manager GUI for easy identification.
    labels:
      com.docker.compose.project: "ipatool"
      maintainer: "iamjairo"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  ipa-data:
    driver: local
    labels:
      description: "ipaTool SQLite DB + config"
  ipa-downloads:
    driver: local
    labels:
      description: "Downloaded IPA files"

# =============================================================================
# Networks
# =============================================================================
networks:
  ipa-net:
    driver: bridge
    # A fixed subnet avoids collisions with other Compose stacks on the NAS.
    ipam:
      config:
        - subnet: "172.30.0.0/24"
